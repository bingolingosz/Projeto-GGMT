<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>
    <link rel="stylesheet" href="cobrinha.css">
</head>
<body>
    <audio id="backgroundMusic" loop>
        <source src="musica de fundo.mp3" type="audio/mp3">
    </audio>
    <audio id="gameOverMusic">
        <source src="gameover.mp3" type="audio/mp3">
    </audio>
   
    <div class="menu" id="menu">
        <h1>Jogo da Cobrinha</h1>
        <button id="startButton">Começar</button>
    </div>
   
    <span id="score">Pontuação: 0</span>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
   
    <div class="game-over" id="gameOverScreen">
        <h1>Game Over</h1>
        <p id="finalScore"></p>
        <button id="restartButton">Reiniciar</button>
    </div>

    <script src="cobrajs.js"></script>
</body>
</html>
